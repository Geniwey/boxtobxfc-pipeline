# ==============================================================================
# ⚽ DOBLE FILO - PIPELINE v2.0
# Añade: rotacion de voz, rotacion de estilo visual, gancho instantaneo seg.0
# ==============================================================================

name: "Doble Filo - Pipeline v2.0"

concurrency:
  group: render-b2b-unico
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONIOENCODING: "utf-8"
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

on:
  repository_dispatch:
    types: [render-video]

permissions:
  contents: write
  actions: write

jobs:
  render-and-publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    outputs:
      youtube_status: ${{ steps.youtube.outputs.youtube_status }}
      video_duration: ${{ steps.audio_gen.outputs.video_duration }}
      titulo_corto: ${{ steps.extraer.outputs.titulo_corto }}

    steps:

      - name: "📂 Checkout del repositorio"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🛠️ Instalar dependencias + elegir estilo del vídeo"
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq --no-install-recommends \
            ffmpeg fontconfig wget curl

          echo "🔤 Descargando fuente Bebas Neue..."
          mkdir -p ~/.fonts
          wget -q --timeout=30 \
            -O ~/.fonts/BebasNeue.ttf \
            "https://github.com/google/fonts/raw/main/ofl/bebasneuee/BebasNeue-Regular.ttf" \
            && echo "FONT_NAME=Bebas Neue" >> $GITHUB_ENV \
            || { cp /usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf \
                 ~/.fonts/BebasNeue.ttf 2>/dev/null; \
                 echo "FONT_NAME=Liberation Sans" >> $GITHUB_ENV; }
          fc-cache -f 2>/dev/null

          python3 -m pip install --quiet \
            openai-whisper edge-tts requests gtts \
            google-auth google-auth-oauthlib google-auth-httplib2 \
            google-api-python-client numpy tqdm Pillow \
            --break-system-packages 2>/dev/null || \
          python3 -m pip install --quiet \
            openai-whisper edge-tts requests gtts \
            google-auth google-auth-oauthlib google-auth-httplib2 \
            google-api-python-client numpy tqdm Pillow

          python3 -m pip install --quiet \
            torch --index-url https://download.pytorch.org/whl/cpu \
            --break-system-packages 2>/dev/null || \
          python3 -m pip install --quiet \
            torch --index-url https://download.pytorch.org/whl/cpu

          echo "✅ Dependencias instaladas"

          # ── Elegir estilo visual al azar (0=dorado, 1=cian, 2=coral) ──────
          STYLE_INDEX=$((RANDOM % 3))
          echo "STYLE_INDEX=$STYLE_INDEX" >> $GITHUB_ENV
          if [ "$STYLE_INDEX" = "0" ]; then
            echo "HIGHLIGHT_ASS_COLOR=&H0000D7FF&" >> $GITHUB_ENV
            echo "BAR_COLOR_HEX=0xFFD700" >> $GITHUB_ENV
            echo "🎨 Estilo: DORADO"
          elif [ "$STYLE_INDEX" = "1" ]; then
            echo "HIGHLIGHT_ASS_COLOR=&H00FFE500&" >> $GITHUB_ENV
            echo "BAR_COLOR_HEX=0x00E5FF" >> $GITHUB_ENV
            echo "🎨 Estilo: CIAN"
          else
            echo "HIGHLIGHT_ASS_COLOR=&H000045FF&" >> $GITHUB_ENV
            echo "BAR_COLOR_HEX=0xFF4500" >> $GITHUB_ENV
            echo "🎨 Estilo: CORAL"
          fi

      - name: "📝 Extraer y sanear textos"
        id: extraer
        timeout-minutes: 2
        env:
          TITULO_RAW: ${{ github.event.client_payload.titulo }}
          DESCRIPCION_RAW: ${{ github.event.client_payload.descripcion }}
          SCRIPT_RAW: ${{ github.event.client_payload.script_text }}
        run: |
          cat << 'PYTHON_EXTRAER' > /tmp/extraer.py
          import os, sys, re, textwrap
          sys.stdout.reconfigure(encoding='utf-8')

          def repair(t):
              if not t: return ''
              try: return t.encode('latin-1').decode('utf-8')
              except: return t

          def clean(t):
              if not t: return ''
              t = t.lstrip('\ufeff').replace('\u00a0', ' ')
              for c in ['\u200b','\u200c','\u200d','\u200e','\u200f','\u2060','\u00ad']:
                  t = t.replace(c, '')
              t = t.replace('\u2019',"'").replace('\u201c','"').replace('\u201d','"')
              return re.sub(r' {2,}', ' ', re.sub(r'\n{3,}', '\n\n', t)).strip()

          def sanitize_tts(t):
              t = re.sub(r'[\*\"\'\«\»\(\)\[\]\{\}\#\_\|\~]', '', t)
              t = re.sub(r'[^\w\s\.,;:\?!¡¿áéíóúÁÉÍÓÚñÑüÜ\-]', '', t)
              return re.sub(r' {2,}', ' ', t).strip()

          titulo_raw = clean(repair(os.environ.get('TITULO_RAW', '')))
          titulo = re.sub(r'[\*\"\'\«\»\_\|\~]', '', titulo_raw).strip()[:100] or '⚽ Doble Filo'

          desc_raw = clean(repair(os.environ.get('DESCRIPCION_RAW', '')))
          descripcion = desc_raw[:5000] or '#WorldCup2026 #Futbol #Shorts #DobleFilo'

          script_raw = clean(repair(os.environ.get('SCRIPT_RAW', '')))
          script_text = script_raw[:5000] or 'El dato que nadie esperaba. Sigue viendo.'
          script_audio = sanitize_tts(script_text)

          open('titulo.txt','w',encoding='utf-8').write(titulo)
          open('descripcion.txt','w',encoding='utf-8').write(descripcion)
          open('script.txt','w',encoding='utf-8').write(script_text)
          open('script_audio.txt','w',encoding='utf-8').write(script_audio)
          open('titulo_corto.txt','w',encoding='utf-8').write(titulo[:50])

          # Texto del gancho instantaneo (titulo envuelto en 2 lineas, sin emoji raros)
          hook_clean = re.sub(r'[\*\"\'\«\»]', '', titulo).strip()
          wrapped = textwrap.fill(hook_clean, width=22, max_lines=3, placeholder='')
          open('hook_text.txt','w',encoding='utf-8').write(wrapped)

          print(f"✅ Título: {titulo[:70]}")
          PYTHON_EXTRAER

          python3 /tmp/extraer.py
          TITULO_CORTO=$(python3 -c "print(open('titulo_corto.txt',encoding='utf-8').read().strip())" 2>/dev/null || echo "Doble Filo")
          echo "titulo_corto=${TITULO_CORTO}" >> $GITHUB_OUTPUT

      - name: "🎙️ Descargar clips Pexels y generar audio (voz rotativa)"
        id: audio_gen
        timeout-minutes: 12
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BUSQUEDA: ${{ github.event.client_payload.busqueda_pexels }}
        run: |
          cat << 'PYTHON_CLIPS' > /tmp/clips.py
          import os, requests, sys
          sys.stdout.reconfigure(encoding='utf-8')

          api_key = os.environ.get('PEXELS_API_KEY', '').strip()
          query = os.environ.get('BUSQUEDA', '').strip() or 'football stadium world cup'

          FOOTBALL_FALLBACKS = [
              'football stadium crowd night',
              'soccer world cup fans celebration',
              'football pitch aerial stadium',
              'soccer ball goal net slow motion'
          ]

          def search_pexels(q):
              if not api_key: return []
              try:
                  res = requests.get(
                      f"https://api.pexels.com/videos/search?query={q}&orientation=portrait&size=medium&per_page=15",
                      headers={'Authorization': api_key}, timeout=15
                  ).json()
                  links = []
                  for v in res.get('videos', []):
                      files = sorted(v['video_files'], key=lambda x: x['width']*x['height'], reverse=True)
                      for f in files:
                          if f['width'] <= f['height'] and f.get('link'):
                              links.append(f['link']); break
                  return links
              except: return []

          links = search_pexels(query)
          if not links:
              for fb in FOOTBALL_FALLBACKS:
                  links = search_pexels(fb)
                  if links: break

          # Variedad: en vez de los primeros 4, baraja antes de elegir
          import random
          random.shuffle(links)

          downloaded = []
          for i, link in enumerate(links[:4]):
              try:
                  r = requests.get(link, timeout=30)
                  if r.status_code == 200:
                      with open(f'clip_{i}.mp4','wb') as f: f.write(r.content)
                      downloaded.append(f'clip_{i}.mp4')
              except: pass
              if len(downloaded) >= 4: break

          if not downloaded:
              print("⚠️ Sin clips Pexels. Fondo oscuro de emergencia.")
              os.system('ffmpeg -y -f lavfi -i "color=c=#0A0A0A:s=1080x1920:d=15:r=30" -c:v libx264 -preset ultrafast pexels.mp4 2>/dev/null')
          else:
              with open('concat_list.txt','w') as f:
                  for i, clip in enumerate(downloaded):
                      out = f'norm_{i}.mp4'
                      os.system(f'ffmpeg -y -i {clip} -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,fps=30" -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -an {out} 2>/dev/null')
                      f.write(f"file '{out}'\n")
              os.system('ffmpeg -y -f concat -safe 0 -i concat_list.txt -c copy pexels.mp4 2>/dev/null')
          print(f"✅ Clips listos: {len(downloaded)}")
          PYTHON_CLIPS

          python3 /tmp/clips.py

          # ── Rotacion de voz: una distinta cada vez, no siempre la misma ───
          VOCES=("es-MX-JorgeNeural" "es-ES-AlvaroNeural" "es-AR-TomasNeural" "es-CO-GonzaloNeural" "es-US-AlonsoNeural")
          VOZ_ELEGIDA=${VOCES[$RANDOM % ${#VOCES[@]}]}
          echo "🎙️ Voz elegida: $VOZ_ELEGIDA"

          AUDIO_OK=false
          edge-tts --voice "$VOZ_ELEGIDA" --rate="+8%" --pitch="-2Hz" \
            --file script_audio.txt --write-media audio_v1.mp3 2>/dev/null || true
          if [ "$(stat -c%s audio_v1.mp3 2>/dev/null || echo 0)" -gt 5000 ]; then
            cp audio_v1.mp3 audio.mp3; AUDIO_OK=true
          fi

          if [ "$AUDIO_OK" = "false" ]; then
            edge-tts --voice "es-ES-AlvaroNeural" --rate="+5%" --pitch="-3Hz" \
              --file script_audio.txt --write-media audio_v2.mp3 2>/dev/null || true
            if [ "$(stat -c%s audio_v2.mp3 2>/dev/null || echo 0)" -gt 5000 ]; then
              cp audio_v2.mp3 audio.mp3; AUDIO_OK=true
              echo "🎙️ Fallback: AlvaroNeural"
            fi
          fi

          if [ "$AUDIO_OK" = "false" ]; then
            python3 -c "from gtts import gTTS; gTTS(text=open('script_audio.txt',encoding='utf-8').read(), lang='es').save('audio.mp3')" 2>/dev/null || true
            echo "🎙️ Fallback: gTTS"
          fi

          ffmpeg -y -i audio.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null

          if [ ! -s "audio.wav" ]; then echo "❌ Audio fallido"; exit 1; fi

          DURACION=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "30")
          DURACION_FINAL=$(python3 -c "print(f'{max(10,min(60,float(\"$DURACION\"))):.2f}')")
          echo "$DURACION_FINAL" > dur.txt
          echo "video_duration=${DURACION_FINAL}" >> $GITHUB_OUTPUT
          echo "⏱️ Duración: ${DURACION_FINAL}s"

      - name: "💬 Generar subtítulos animados (Whisper)"
        timeout-minutes: 15
        run: |
          python3 -c "
          import whisper, json, sys
          sys.stdout.reconfigure(encoding='utf-8')
          model = whisper.load_model('small')
          result = model.transcribe(
              'audio.wav', language='es',
              word_timestamps=True, temperature=0.0,
              initial_prompt='Análisis táctico y predicciones del Mundial de Fútbol 2026.'
          )
          json.dump(result, open('audio.json','w',encoding='utf-8'), ensure_ascii=False)
          print(f\"✅ Whisper: {len(result.get('segments',[]))} segmentos\")
          " 2>/dev/null || true

          if [ ! -s "audio.json" ]; then
            python3 -c "
          import json
          t=open('script.txt',encoding='utf-8').read().strip().split()
          d=float(open('dur.txt').read().strip())
          tpw=d/max(len(t),1)
          json.dump({'segments':[{'start':i*tpw,'end':(i+1)*tpw,'words':[{'word':w,'start':i*tpw,'end':(i+1)*tpw}]}for i,w in enumerate(t)]},open('audio.json','w',encoding='utf-8'))
          "
            echo "⚠️ Subtítulos fallback activados"
          fi

          cat << 'PYTHON_ASS' > /tmp/gen_ass.py
          import json, os, sys, re
          sys.stdout.reconfigure(encoding='utf-8')

          font_name = os.environ.get('FONT_NAME', 'Bebas Neue')
          highlight_color = os.environ.get('HIGHLIGHT_ASS_COLOR', '&H0000D7FF&')

          def fmt(s):
              s = max(0.0, s)
              return f"{int(s//3600)}:{int((s%3600)//60):02d}:{int(s%60):02d}.{min(int(round((s%1)*100)),99):02d}"

          def clean(t):
              return re.sub(r' {2,}',' ',t.replace('{','').replace('}','').replace('\\','').replace('\n',' ')).strip()

          try:
              original = open('script.txt', encoding='utf-8').read()
              gold_words = set(re.sub(r'[^\w\s]','',w.strip('*')).upper()
                               for w in original.split()
                               if w.startswith('*') and w.endswith('*') and len(w) > 2)
          except:
              gold_words = set()

          data = json.load(open('audio.json','r',encoding='utf-8'))
          all_words = [
              {'word': clean(w.get('word','')), 'start': w.get('start',0.0), 'end': w.get('end',0.0)}
              for s in data.get('segments',[])
              for w in s.get('words',[])
              if w.get('word','').strip() and w.get('end',0) > w.get('start',0)
          ]

          header = f"""[Script Info]
          ScriptType: v4.00+
          WrapStyle: 0
          ScaledBorderAndShadow: yes
          PlayResX: 1080
          PlayResY: 1920

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,{font_name},108,&H00FFFFFF,&H00FFFFFF,&H00000000,&H99000000,-1,0,0,0,100,100,0,0,3,9,0,5,40,40,255,1

          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          """.replace('          ','')

          chunks, cur, chars = [], [], 0
          for i, w in enumerate(all_words):
              w_upper = w['word'].upper().strip()
              clean_w = re.sub(r'[^\w\s]','',w_upper)
              if clean_w in gold_words and clean_w:
                  w_text = f"{{\\c{highlight_color}}}{w_upper}{{\\c&H00FFFFFF&}}"
              else:
                  w_text = w_upper
              cur.append({'text': w_text, 'start': w['start'], 'end': w['end']})
              chars += len(re.sub(r'\{.*?\}','',w_text))
              if len(cur) >= 2 or chars > 12 or i == len(all_words)-1:
                  chunks.append({'text':' '.join(x['text'] for x in cur),'start':cur[0]['start'],'end':cur[-1]['end']})
                  cur, chars = [], 0

          lines = []
          for i, c in enumerate(chunks):
              end = chunks[i+1]['start'] if i < len(chunks)-1 else c['end']+0.1
              if c['start'] < end:
                  anim = r'{\fscx82\fscy82\t(0,110,\fscx100\fscy100)}'
                  lines.append(f"Dialogue: 0,{fmt(c['start'])},{fmt(end)},Default,,0,0,0,,{anim}{c['text']}")

          open('subtitles.ass','w',encoding='utf-8').write(header+'\n'+'\n'.join(lines))
          print(f"✅ Subtítulos: {len(lines)} líneas")
          PYTHON_ASS

          FONT_NAME=$FONT_NAME HIGHLIGHT_ASS_COLOR=$HIGHLIGHT_ASS_COLOR python3 /tmp/gen_ass.py

      - name: "🎬 Renderizar vídeo Doble Filo"
        timeout-minutes: 20
        run: |
          DUR=$(cat dur.txt)
          ASS_PATH=$(realpath subtitles.ass)
          ASS_ESC=$(echo "$ASS_PATH" | sed 's/:/\\:/g')
          HOOK_PATH=$(realpath hook_text.txt)
          HOOK_ESC=$(echo "$HOOK_PATH" | sed 's/:/\\:/g')

          if [ ! -f "logo.png" ]; then
            python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import os
          img = Image.new('RGBA',(320,72),(0,0,0,0))
          draw = ImageDraw.Draw(img)
          draw.rectangle([0,0,320,72],fill=(10,10,10,200))
          try:
              font = ImageFont.truetype(os.path.expanduser('~/.fonts/BebasNeue.ttf'),46)
              draw.text((12,12),'DOBLE FILO',font=font,fill='#FFD700')
          except:
              draw.text((12,20),'DOBLE FILO',fill='#FFD700')
          img.save('logo.png')
          " 2>/dev/null || wget -q -O logo.png "https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png"
          fi

          ffmpeg -y \
            -stream_loop -1 -i pexels.mp4 \
            -i audio.wav \
            -i logo.png \
            -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,zoompan=z='min(max(zoom\,pzoom)+0.0003\,1.22)':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1080x1920,eq=brightness=-0.06:saturation=1.2:contrast=1.05[bg];[2:v]scale=300:-1,colorchannelmixer=aa=0.88[logo];[bg][logo]overlay=W-w-35:H-h-35[bg_logo];[bg_logo]drawtext=fontfile=${HOME}/.fonts/BebasNeue.ttf:textfile='${HOOK_ESC}':fontsize=78:fontcolor=white:borderw=5:bordercolor=black:line_spacing=10:x=(w-text_w)/2:y=(h-text_h)/2-300:enable='lt(t\,1.6)'[hooked];[hooked]subtitles='${ASS_ESC}':fontsdir=~/.fonts[vwithsubs];[vwithsubs]drawbox=x=0:y=0:w='min(iw\,iw*t/${DUR})':h=14:color=${BAR_COLOR_HEX}@0.95:t=fill[outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p -r 30 \
            -c:a aac -b:a 192k \
            -t "$DUR" \
            -movflags +faststart \
            output.mp4 \
            2>&1 | tee ffmpeg.log | tail -5

          if [ ! -f "output.mp4" ] || [ "$(stat -c%s output.mp4)" -lt 100000 ]; then
            echo "❌ FFmpeg generó archivo inválido"
            cat ffmpeg.log | tail -30
            exit 1
          fi
          echo "✅ Vídeo renderizado: $(du -sh output.mp4 | cut -f1)"

      - name: "📺 Publicar en YouTube (rotacion 4 proyectos)"
        id: youtube
        continue-on-error: true
        timeout-minutes: 10
        env:
          # --- ¡AQUÍ ESTÁ LA MAGIA PARA EL PROYECTO 1! ---
          YOUTUBE_CLIENT_ID_1: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET_1: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_1: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          
          # --- Y LOS DEMÁS SIGUEN IGUAL CON SUS NÚMEROS ---
          YOUTUBE_CLIENT_ID_2: ${{ secrets.YOUTUBE_CLIENT_ID_2 }}
          YOUTUBE_CLIENT_SECRET_2: ${{ secrets.YOUTUBE_CLIENT_SECRET_2 }}
          YOUTUBE_REFRESH_TOKEN_2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_2 }}
          YOUTUBE_CLIENT_ID_3: ${{ secrets.YOUTUBE_CLIENT_ID_3 }}
          YOUTUBE_CLIENT_SECRET_3: ${{ secrets.YOUTUBE_CLIENT_SECRET_3 }}
          YOUTUBE_REFRESH_TOKEN_3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_3 }}
          YOUTUBE_CLIENT_ID_4: ${{ secrets.YOUTUBE_CLIENT_ID_4 }}
          YOUTUBE_CLIENT_SECRET_4: ${{ secrets.YOUTUBE_CLIENT_SECRET_4 }}
          YOUTUBE_REFRESH_TOKEN_4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_4 }}
        run: |
          cat << 'PYTHON_YT' > /tmp/subir_yt.py
          import os, sys, traceback
          from datetime import datetime, timezone
          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from googleapiclient.errors import HttpError
          sys.stdout.reconfigure(encoding='utf-8')

          try:
              hora_actual = datetime.now(timezone.utc).hour
              proyecto_idx = (hora_actual % 4) + 1
              print(f"Hora UTC: {hora_actual} -> Usando proyecto {proyecto_idx} de 4")

              creds = Credentials.from_authorized_user_info({
                  'client_id': os.environ[f'YOUTUBE_CLIENT_ID_{proyecto_idx}'],
                  'client_secret': os.environ[f'YOUTUBE_CLIENT_SECRET_{proyecto_idx}'],
                  'refresh_token': os.environ[f'YOUTUBE_REFRESH_TOKEN_{proyecto_idx}'],
                  'token_uri': 'https://oauth2.googleapis.com/token',
                  'scopes': ['https://www.googleapis.com/auth/youtube.upload']
              })
              creds.refresh(Request())
              yt = build('youtube', 'v3', credentials=creds)

              titulo = open('titulo.txt','r',encoding='utf-8').read().strip()[:100]
              desc = open('descripcion.txt','r',encoding='utf-8').read().strip()[:5000]

              body = {
                  'snippet': {
                      'title': titulo,
                      'description': desc,
                      'tags': [
                          'mundialdefutbol','mundial2026','futbol','shorts',
                          'futbolshorts','worldcup2026','doblefilo',
                          'prediccion','pronostico','analisis','tactica',
                          'deporte','fifaworldcup','futbol2026'
                      ],
                      'categoryId': '17',
                      'defaultLanguage': 'es',
                      'defaultAudioLanguage': 'es'
                  },
                  'status': {
                      'privacyStatus': 'public',
                      'selfDeclaredMadeForKids': False,
                      'madeForKids': False
                  }
              }

              media = MediaFileUpload('output.mp4', mimetype='video/mp4', resumable=True, chunksize=50*1024*1024)
              req = yt.videos().insert(part='snippet,status', body=body, media_body=media)

              resp = None
              while resp is None:
                  status, resp = req.next_chunk()
                  if status:
                      print(f"   📤 {int(status.progress()*100)}%")

              video_id = resp['id']
              print(f"✅ PUBLICADO: https://youtube.com/shorts/{video_id}")
              open('video_id.txt','w').write(video_id)

          except HttpError as e:
              error_content = e.content.decode() if hasattr(e, 'content') else str(e)
              if 'uploadLimitExceeded' in error_content:
                  print("⚠️ LIMITE DE CANAL ALCANZADO (no es problema de cuota de API ni de proyecto)")
                  print("   YouTube ha puesto un tope diario de subidas a ESTE CANAL en concreto.")
                  print("   Rotar de proyecto NO ayuda: el limite es del canal de YouTube, no de la API key.")
                  print("   Solucion: bajar la cadencia de subidas unos dias y verificar el telefono del canal.")
                  sys.exit(2)
              else:
                  print(f"❌ YouTube API {e.resp.status}: {error_content}")
                  sys.exit(1)
          except Exception:
              traceback.print_exc()
              sys.exit(1)
          PYTHON_YT

          python3 /tmp/subir_yt.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "youtube_status=✅ YouTube OK" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "youtube_status=⚠️ Limite diario del canal alcanzado (bajar cadencia)" >> $GITHUB_OUTPUT
          else
            echo "youtube_status=❌ YouTube Falló" >> $GITHUB_OUTPUT
          fi

      - name: "💾 Guardar memoria de noticia/equipo usado"
        continue-on-error: true
        env:
          EQUIPO_USADO: ${{ github.event.client_payload.equipo_usado }}
        run: |
          if [ -n "$EQUIPO_USADO" ]; then
            echo "Guardando '$EQUIPO_USADO' en la memoria..."
            touch memoria_equipos.txt
            echo "$EQUIPO_USADO" >> memoria_equipos.txt
            
            # Mantener solo los últimos 6 registros
            tail -n 6 memoria_equipos.txt > tmp.txt && mv tmp.txt memoria_equipos.txt
            
            # Subir el cambio a GitHub
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add memoria_equipos.txt
            git commit -m "🤖 Memoria: Registrado '$EQUIPO_USADO'" || echo "Sin cambios"
            git push
          else
            echo "⚠️ No se recibió equipo_usado en el payload desde Activepieces."
          fi

      - name: "📦 Artifacts de diagnóstico"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "b2b-run-${{ github.run_number }}"
          path: |
            output.mp4
            subtitles.ass
            hook_text.txt
            titulo.txt
            script.txt
            ffmpeg.log
          retention-days: 3
          if-no-files-found: warn
